<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#121a33"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#162044"/>
      <stop offset="1" stop-color="#0f1730"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0eeefc" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#aaff00" stop-opacity="0.70"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Top bar -->
  <g opacity="0.95">
    <rect x="60" y="48" width="1080" height="72" rx="18" fill="#0a0f1d" stroke="#2a3558" stroke-width="2"/>
    <circle cx="104" cy="84" r="18" fill="url(#accent)"/>
    <rect x="136" y="72" width="220" height="24" rx="12" fill="#c7d0ff" opacity="0.18"/>
    <rect x="820" y="72" width="140" height="24" rx="12" fill="#c7d0ff" opacity="0.10"/>
    <rect x="972" y="72" width="148" height="24" rx="12" fill="#c7d0ff" opacity="0.10"/>
  </g>

  <!-- Main layout -->
  <g filter="url(#shadow)">
    <!-- Left: calendar card -->
    <rect x="60" y="152" width="690" height="600" rx="26" fill="url(#card)" stroke="#2a3558" stroke-width="2"/>

    <!-- Calendar header -->
    <rect x="92" y="186" width="626" height="56" rx="18" fill="#0a0f1d" stroke="#2a3558" stroke-width="2" opacity="0.95"/>
    <rect x="112" y="204" width="180" height="20" rx="10" fill="#c7d0ff" opacity="0.20"/>
    <rect x="612" y="204" width="86" height="20" rx="10" fill="#c7d0ff" opacity="0.10"/>
    <rect x="520" y="204" width="76" height="20" rx="10" fill="#c7d0ff" opacity="0.10"/>

    <!-- Calendar grid -->
    <g opacity="0.92">
      <!-- weekday labels -->
      <g opacity="0.35" fill="#c7d0ff">
        <rect x="112" y="266" width="70" height="12" rx="6"/>
        <rect x="206" y="266" width="70" height="12" rx="6"/>
        <rect x="300" y="266" width="70" height="12" rx="6"/>
        <rect x="394" y="266" width="70" height="12" rx="6"/>
        <rect x="488" y="266" width="70" height="12" rx="6"/>
        <rect x="582" y="266" width="70" height="12" rx="6"/>
        <rect x="676" y="266" width="42" height="12" rx="6"/>
      </g>

      <!-- 5 rows x 7 cols -->
      <g stroke="#2a3558" stroke-width="1" opacity="0.8">
        <!-- row 1 -->
        <rect x="92" y="296" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="190" y="296" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="288" y="296" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="386" y="296" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="484" y="296" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="582" y="296" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="680" y="296" width="38" height="78" rx="14" fill="#0b1220"/>

        <!-- row 2 -->
        <rect x="92" y="386" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="190" y="386" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="288" y="386" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="386" y="386" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="484" y="386" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="582" y="386" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="680" y="386" width="38" height="78" rx="14" fill="#0b1220"/>

        <!-- row 3 -->
        <rect x="92" y="476" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="190" y="476" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="288" y="476" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="386" y="476" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="484" y="476" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="582" y="476" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="680" y="476" width="38" height="78" rx="14" fill="#0b1220"/>

        <!-- row 4 -->
        <rect x="92" y="566" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="190" y="566" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="288" y="566" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="386" y="566" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="484" y="566" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="582" y="566" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="680" y="566" width="38" height="78" rx="14" fill="#0b1220"/>

        <!-- row 5 -->
        <rect x="92" y="656" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="190" y="656" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="288" y="656" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="386" y="656" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="484" y="656" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="582" y="656" width="90" height="78" rx="14" fill="#0b1220"/>
        <rect x="680" y="656" width="38" height="78" rx="14" fill="#0b1220"/>
      </g>

      <!-- Highlighted appointment blocks -->
      <g filter="url(#soft)">
        <rect x="206" y="410" width="58" height="14" rx="7" fill="url(#accent)" opacity="0.9"/>
        <rect x="402" y="500" width="58" height="14" rx="7" fill="url(#accent)" opacity="0.8"/>
        <rect x="500" y="590" width="58" height="14" rx="7" fill="url(#accent)" opacity="0.75"/>
      </g>
    </g>

    <!-- Right: schedule list card -->
    <rect x="780" y="152" width="360" height="600" rx="26" fill="url(#card)" stroke="#2a3558" stroke-width="2"/>

    <!-- Doctor chip -->
    <g opacity="0.95">
      <rect x="812" y="186" width="306" height="68" rx="18" fill="#0a0f1d" stroke="#2a3558" stroke-width="2"/>
      <circle cx="850" cy="220" r="18" fill="#c7d0ff" opacity="0.22"/>
      <rect x="878" y="206" width="150" height="14" rx="7" fill="#c7d0ff" opacity="0.20"/>
      <rect x="878" y="228" width="190" height="12" rx="6" fill="#c7d0ff" opacity="0.10"/>
      <!-- small status dot -->
      <circle cx="1088" cy="220" r="8" fill="#aaff00" opacity="0.75"/>
    </g>

    <!-- Appointment list -->
    <g opacity="0.95">
      <rect x="812" y="274" width="306" height="92" rx="18" fill="#0b1220" stroke="#2a3558" stroke-width="1.5"/>
      <rect x="812" y="382" width="306" height="92" rx="18" fill="#0b1220" stroke="#2a3558" stroke-width="1.5"/>
      <rect x="812" y="490" width="306" height="92" rx="18" fill="#0b1220" stroke="#2a3558" stroke-width="1.5"/>
      <rect x="812" y="598" width="306" height="92" rx="18" fill="#0b1220" stroke="#2a3558" stroke-width="1.5"/>

      <!-- List item content lines -->
      <g fill="#c7d0ff">
        <!-- item 1 -->
        <rect x="840" y="302" width="120" height="14" rx="7" opacity="0.20"/>
        <rect x="840" y="326" width="190" height="12" rx="6" opacity="0.10"/>
        <rect x="1036" y="302" width="56" height="14" rx="7" opacity="0.14"/>
        <!-- item 2 -->
        <rect x="840" y="410" width="136" height="14" rx="7" opacity="0.20"/>
        <rect x="840" y="434" width="210" height="12" rx="6" opacity="0.10"/>
        <rect x="1036" y="410" width="56" height="14" rx="7" opacity="0.14"/>
        <!-- item 3 -->
        <rect x="840" y="518" width="150" height="14" rx="7" opacity="0.20"/>
        <rect x="840" y="542" width="180" height="12" rx="6" opacity="0.10"/>
        <rect x="1036" y="518" width="56" height="14" rx="7" opacity="0.14"/>
        <!-- item 4 -->
        <rect x="840" y="626" width="132" height="14" rx="7" opacity="0.20"/>
        <rect x="840" y="650" width="206" height="12" rx="6" opacity="0.10"/>
        <rect x="1036" y="626" width="56" height="14" rx="7" opacity="0.14"/>
      </g>

      <!-- Accent dots -->
      <g>
        <circle cx="1092" cy="336" r="6" fill="#0eeefc" opacity="0.75"/>
        <circle cx="1092" cy="444" r="6" fill="#aaff00" opacity="0.70"/>
        <circle cx="1092" cy="552" r="6" fill="#b46cff" opacity="0.70"/>
        <circle cx="1092" cy="660" r="6" fill="#0eeefc" opacity="0.55"/>
      </g>
    </g>
  </g>
</svg>
