<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111b33"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0eeefc" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#aaff00" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Phone -->
  <g filter="url(#shadow)">
    <rect x="390" y="70" width="420" height="660" rx="72" fill="#0a0f1d" stroke="#2a3558" stroke-width="6"/>
    <rect x="420" y="132" width="360" height="536" rx="44" fill="url(#screen)" stroke="#2a3558" stroke-width="4"/>

    <!-- Notch -->
    <rect x="520" y="92" width="160" height="26" rx="13" fill="#070b16" stroke="#2a3558" stroke-width="3"/>
    <circle cx="472" cy="105" r="10" fill="#070b16" stroke="#2a3558" stroke-width="3"/>

    <!-- Home indicator -->
    <rect x="545" y="690" width="110" height="10" rx="5" fill="#2a3558" opacity="0.9"/>

    <!-- Minimal UI hint lines -->
    <rect x="455" y="172" width="290" height="18" rx="9" fill="#c7d0ff" opacity="0.18"/>
    <rect x="455" y="208" width="240" height="14" rx="7" fill="#c7d0ff" opacity="0.12"/>
    <rect x="455" y="238" width="260" height="14" rx="7" fill="#c7d0ff" opacity="0.10"/>

    <g opacity="0.18">
      <rect x="455" y="290" width="290" height="86" rx="18" fill="#0eeefc"/>
      <rect x="455" y="390" width="290" height="86" rx="18" fill="#aaff00"/>
      <rect x="455" y="490" width="290" height="86" rx="18" fill="#b46cff"/>
    </g>
  </g>
</svg>
